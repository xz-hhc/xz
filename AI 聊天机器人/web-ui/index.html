<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天机器人</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --primary-dark: #3730A3;
            --bg: #0F0F1A;
            --surface: #1A1A2E;
            --surface-hover: #222240;
            --border: #2D2D50;
            --text: #E8E8F0;
            --text-secondary: #9494B8;
            --user-msg: #4F46E5;
            --bot-msg: #1E1E3A;
            --success: #34D399;
            --danger: #F87171;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: 100vh;
            gap: 0;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo svg { width: 28px; height: 28px; }
        .sidebar-section { margin-bottom: 20px; }
        .sidebar-section h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .doc-item {
            padding: 8px 12px;
            background: var(--surface-hover);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }
        .doc-item:hover { background: var(--border); }
        .doc-item .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .doc-item .delete-btn {
            color: var(--danger);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            font-size: 16px;
            padding: 0 4px;
        }
        .doc-item:hover .delete-btn { opacity: 1; }
        .empty-state {
            color: var(--text-secondary);
            font-size: 13px;
            padding: 12px;
            text-align: center;
        }
        .sidebar-footer {
            margin-top: auto;
            font-size: 12px;
            color: var(--text-secondary);
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Main Chat Area */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }
        .chat-header h2 { font-size: 16px; font-weight: 600; }
        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.7;
            animation: msgIn 0.3s ease;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            background: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            background: var(--bot-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .message .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: var(--text-secondary);
        }
        .message .sources-item {
            padding: 4px 0;
            cursor: pointer;
        }
        .message .sources-item:hover { color: var(--primary-light); }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper textarea {
            flex: 1;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-wrapper textarea:focus { border-color: var(--primary); }
        .input-wrapper textarea::placeholder { color: var(--text-secondary); }
        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .send-btn:hover { background: var(--primary-dark); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Right Panel - Upload */
        .upload-panel {
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .upload-panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(79,70,229,0.05);
        }
        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(79,70,229,0.1);
        }
        .upload-zone.dragover {
            border-color: var(--primary-light);
            background: rgba(79,70,229,0.15);
        }
        .upload-zone svg { width: 40px; height: 40px; color: var(--text-secondary); margin-bottom: 8px; }
        .upload-zone p { color: var(--text-secondary); font-size: 13px; }
        .upload-zone .formats { font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
        .upload-progress {
            margin-top: 16px;
            display: none;
        }
        .upload-progress.active { display: block; }
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .upload-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .file-list {
            margin-top: 16px;
            flex: 1;
            overflow-y: auto;
        }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4m0 0L8 8m4-4l4 4M12 16v4m0 0l-4-4m4 4l4-4M4 12h4m0 0L4 8m4 4l-4 4M16 12h4m0 0l-4-4m4 4l-4 4"/></svg>
            AI 知识助手
        </div>
        <div class="sidebar-section">
            <h3>📚 知识库</h3>
            <div id="knowledge-list"></div>
        </div>
        <div class="sidebar-footer">
            <div>💡 上传资料后，AI会自动学习</div>
            <div style="margin-top:4px">支持 TXT / PDF / DOCX / CSV / MD / JSON</div>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-area">
        <div class="chat-header">
            <h2>💬 智能对话</h2>
            <div class="status">
                <span class="status-dot"></span>
                <span id="status-text">系统就绪</span>
                <span style="margin-left:12px;font-size:12px;color:var(--text-secondary)" id="doc-count"></span>
            </div>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                你好！我是你的AI知识助手 👋<br><br>
                你可以通过右侧面板上传文档资料（PDF、Word、TXT等格式），
                上传后我会自动学习这些资料的内容，然后你就可以向我提问，我会基于你的资料来回答。<br><br>
                让我开始吧！
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="msg-input" rows="1" placeholder="输入你的问题..." oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </main>

    <!-- Upload Panel -->
    <aside class="upload-panel">
        <h3>📤 上传知识文档</h3>
        <div class="upload-zone" id="upload-zone"
             onclick="document.getElementById('file-input').click()"
             ondragover="event.preventDefault();this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="handleDrop(event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <p>点击或拖拽文件到此处上传</p>
            <div class="formats">支持 TXT · PDF · DOCX · CSV · MD · JSON</div>
        </div>
        <input type="file" id="file-input" hidden multiple accept=".txt,.md,.csv,.pdf,.docx,.json" onchange="handleFiles(this.files)">
        <div class="upload-progress" id="upload-progress">
            <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
            <div class="upload-status" id="upload-status"></div>
        </div>
        <div class="file-list" id="file-list"></div>
    </aside>
</div>

<script>
const API = window.location.origin;
let currentConvId = null;

// Auto-resize textarea
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Enter to send, Shift+Enter for newline
document.getElementById('msg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// Send message
async function sendMessage() {
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    input.style.height = 'auto';

    addMessage(msg, 'user');
    showTyping();

    try {
        const resp = await fetch(`${API}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, conversation_id: currentConvId }),
        });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        currentConvId = data.conversation_id;
        hideTyping();
        addMessage(data.reply, 'bot', data.sources);
    } catch (err) {
        hideTyping();
        addMessage('抱歉，发生了错误：' + err.message, 'bot');
    }
}

function addMessage(content, role, sources) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;

    const text = document.createElement('div');
    text.innerHTML = content.replace(/\n/g, '<br>');
    div.appendChild(text);

    if (sources && sources.length > 0) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        srcDiv.innerHTML = '<strong>📖 参考来源：</strong>';
        sources.forEach(s => {
            srcDiv.innerHTML += `<div class="sources-item">📄 ${s.filename}（相似度: ${(s.similarity*100).toFixed(0)}%）</div>`;
        });
        div.appendChild(srcDiv);
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-msg';
    div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    document.getElementById('send-btn').disabled = true;
}

function hideTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
    document.getElementById('send-btn').disabled = false;
}

// File upload
function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-zone').classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
}

async function handleFiles(files) {
    for (const file of files) {
        await uploadFile(file);
    }
}

async function uploadFile(file) {
    const prog = document.getElementById('upload-progress');
    const fill = document.getElementById('progress-fill');
    const status = document.getElementById('upload-status');
    prog.classList.add('active');
    status.textContent = `正在上传: ${file.name}...`;
    fill.style.width = '30%';

    const form = new FormData();
    form.append('file', file);

    try {
        const resp = await fetch(`${API}/api/upload`, { method: 'POST', body: form });
        fill.style.width = '90%';
        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.detail || '上传失败');
        }
        const data = await resp.json();
        fill.style.width = '100%';
        status.textContent = `✅ ${data.message}`;
        setTimeout(() => { prog.classList.remove('active'); fill.style.width = '0%'; }, 2000);
        loadKnowledgeBase();
    } catch (err) {
        status.textContent = '❌ ' + err.message;
        fill.style.width = '0%';
    }
}

// Knowledge base
async function loadKnowledgeBase() {
    try {
        const resp = await fetch(`${API}/api/knowledge/list`);
        const data = await resp.json();
        const list = document.getElementById('knowledge-list');
        const docCount = document.getElementById('doc-count');

        docCount.textContent = data.total > 0 ? `📄 ${data.total} 篇文档` : '';

        if (data.total === 0) {
            list.innerHTML = '<div class="empty-state">暂无文档，请上传资料</div>';
            return;
        }

        list.innerHTML = data.documents.map(d => `
            <div class="doc-item">
                <span class="name">📄 ${d.filename}</span>
                <button class="delete-btn" onclick="deleteDoc('${d.id}')" title="删除">×</button>
            </div>
        `).join('');
    } catch (err) {
        console.error('Failed to load knowledge base:', err);
    }
}

async function deleteDoc(docId) {
    if (!confirm('确定要删除此文档吗？')) return;
    try {
        const resp = await fetch(`${API}/api/knowledge/${docId}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error('删除失败');
        loadKnowledgeBase();
    } catch (err) {
        alert('删除失败: ' + err.message);
    }
}

// Init
loadKnowledgeBase();
</script>
</body>
</html>
